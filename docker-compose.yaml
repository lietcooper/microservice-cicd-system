services:
  postgres:
    image: postgres:16-alpine
    container_name: cicd-postgres
    environment:
      POSTGRES_DB: cicd
      POSTGRES_USER: cicd
      POSTGRES_PASSWORD: cicd
    ports:
      - "5432:5432"
    volumes:
      - cicd-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cicd"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: cicd-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: cicd
      RABBITMQ_DEFAULT_PASS: cicd
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - cicd-rmqdata:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cicd-pgdata:
  cicd-rmqdata:
