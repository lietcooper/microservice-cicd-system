name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: chmod +x gradlew
      - run: ./gradlew assemble

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cicd
          POSTGRES_PASSWORD: cicd
          POSTGRES_DB: cicd
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: chmod +x gradlew
      - run: ./gradlew test
      - run: ./gradlew jacocoAggregatedReport
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/build/test-results/test/'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: build/reports/jacoco/aggregated/

  static-analysis:
    name: Static Analysis
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: chmod +x gradlew
      - run: ./gradlew checkstyleMain checkstyleTest
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkstyle-reports
          path: '**/build/reports/checkstyle/'

  javadoc:
    name: Javadoc
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: chmod +x gradlew
      - run: ./gradlew javadoc
      - uses: actions/upload-artifact@v4
        with:
          name: javadoc
          path: '**/build/docs/javadoc/'

  docker:
    name: Build Docker Images
    needs: [test, static-analysis]
    runs-on: ubuntu-latest
    # Images are built to verify correctness but not pushed.
    # The private org repo does not grant GITHUB_TOKEN permission to write packages.
    steps:
      - uses: actions/checkout@v4
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: server
          push: false
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: worker
          push: false
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: cli
          push: false

  github-release:
    name: GitHub Release
    needs: [test, static-analysis, javadoc, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: chmod +x gradlew
      - run: ./gradlew assemble
      - uses: actions/download-artifact@v4
        with:
          name: javadoc
          path: javadoc
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            server/build/libs/server-0.1.0.jar
            worker/build/libs/worker-0.1.0.jar
            cli/build/libs/cli-0.1.0.jar
