spring.application.name=cicd-worker
server.port=8081

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=cicd
spring.rabbitmq.password=cicd
spring.rabbitmq.listener.simple.acknowledge-mode=manual
spring.rabbitmq.listener.simple.prefetch=1

# MinIO (artifact storage)
cicd.minio.endpoint=http://localhost:9000
cicd.minio.access-key=minioadmin
cicd.minio.secret-key=minioadmin
cicd.minio.bucket=cicd-artifacts

# Actuator & Prometheus
management.endpoints.web.exposure.include=health,prometheus,info
management.metrics.export.prometheus.enabled=true
management.endpoint.health.show-details=always
