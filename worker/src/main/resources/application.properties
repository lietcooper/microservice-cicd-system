spring.application.name=cicd-worker
server.port=8081

# Database (same as server)
spring.datasource.url=jdbc:postgresql://localhost:5432/cicd
spring.datasource.username=cicd
spring.datasource.password=cicd
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=cicd
spring.rabbitmq.password=cicd
spring.rabbitmq.listener.simple.acknowledge-mode=manual
spring.rabbitmq.listener.simple.prefetch=1
