{{- if .Values.tempo.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "cicd.fullname" . }}-tempo
  labels:
    {{- include "cicd.labels" . | nindent 4 }}
    app.kubernetes.io/component: tempo
spec:
  serviceName: {{ include "cicd.fullname" . }}-tempo
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: tempo
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: tempo
    spec:
      securityContext:
        fsGroup: 10001
        runAsUser: 10001
        runAsGroup: 10001
      initContainers:
        - name: init-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 10001:10001 /var/tempo"]
          volumeMounts:
            - name: data
              mountPath: /var/tempo
          securityContext:
            runAsUser: 0
      containers:
        - name: tempo
          image: "{{ .Values.tempo.image.repository }}:{{ .Values.tempo.image.tag }}"
          args:
            - -config.file=/etc/tempo/tempo-config.yaml
          ports:
            - name: http
              containerPort: {{ .Values.tempo.port }}
              protocol: TCP
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
            - name: data
              mountPath: /var/tempo
          resources: {}
      volumes:
        - name: config
          configMap:
            name: {{ include "cicd.fullname" . }}-tempo
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: {{ .Values.tempo.storageClass | default "standard" }}
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.tempo.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cicd.fullname" . }}-tempo
  labels:
    {{- include "cicd.labels" . | nindent 4 }}
    app.kubernetes.io/component: tempo
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.tempo.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: 4317
      targetPort: otlp-grpc
      protocol: TCP
      name: otlp-grpc
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: tempo
{{- end }}
