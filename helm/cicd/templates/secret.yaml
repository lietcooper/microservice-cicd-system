apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cicd.fullname" . }}-secret
  labels:
    {{- include "cicd.labels" . | nindent 4 }}
type: Opaque
data:
  # Passwords are base64-encoded by Helm
  SPRING_DATASOURCE_PASSWORD: {{ include "cicd.postgresql.password" . | b64enc | quote }}
  SPRING_RABBITMQ_PASSWORD: {{ include "cicd.rabbitmq.password" . | b64enc | quote }}
  # Raw credentials for internal PostgreSQL / RabbitMQ StatefulSets
  POSTGRES_PASSWORD: {{ include "cicd.postgresql.password" . | b64enc | quote }}
  RABBITMQ_DEFAULT_PASS: {{ include "cicd.rabbitmq.password" . | b64enc | quote }}
