apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cicd.fullname" . }}-config
  labels:
    {{- include "cicd.labels" . | nindent 4 }}
data:
  # ---- RabbitMQ (server + worker) ----
  SPRING_RABBITMQ_HOST: {{ include "cicd.rabbitmq.host" . | quote }}
  SPRING_RABBITMQ_PORT: {{ include "cicd.rabbitmq.port" . | quote }}
  SPRING_RABBITMQ_USERNAME: {{ include "cicd.rabbitmq.username" . | quote }}

  # ---- PostgreSQL (server only) ----
  SPRING_DATASOURCE_URL: {{ include "cicd.postgresql.url" . | quote }}
  SPRING_DATASOURCE_USERNAME: {{ include "cicd.postgresql.username" . | quote }}

  # ---- MinIO (worker only) ----
  CICD_MINIO_ENDPOINT: {{ include "cicd.minio.endpoint" . | quote }}
  CICD_MINIO_ACCESS_KEY: {{ include "cicd.minio.accessKey" . | quote }}
  CICD_MINIO_BUCKET: {{ .Values.minio.bucket | quote }}

  # ---- OpenTelemetry ----
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://{{ include "cicd.fullname" . }}-otel-collector:4317"
  OTEL_METRICS_EXPORTER: none
  OTEL_LOGS_EXPORTER: otlp
