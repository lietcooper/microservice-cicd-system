{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cicd.fullname" . }}-prometheus
  labels:
    {{- include "cicd.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.prometheus.scrapeInterval }}
      evaluation_interval: {{ .Values.prometheus.scrapeInterval }}

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      - job_name: cicd-server
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - {{ include "cicd.fullname" . }}-server:{{ .Values.server.service.port }}

      - job_name: cicd-worker
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - {{ include "cicd.fullname" . }}-worker:{{ .Values.worker.service.port }}

    storage:
      tsdb:
        exemplars:
          max_exemplars: 100000
{{- end }}
